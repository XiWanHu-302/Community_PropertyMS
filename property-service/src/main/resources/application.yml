server:
  port: 8082

spring:
  application:
    name: property-service

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        username: nacos
        password: nacos
        fail-fast: false
      # Nacos 配置中心由 bootstrap.yml 管理
    openfeign:
      circuitbreaker:
        enabled: true             # Feign 降级：拦截 LoadBalancer 等所有异常
  datasource:
    url: jdbc:mysql://localhost:3306/community_property?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: community-property-ms-secret-key-2026
  expiration: 86400000

# Resilience4j 断路器：首次失败即熔断（演示用；生产环境调高阈值）
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 2
        minimum-number-of-calls: 1
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        automatic-transition-from-open-to-half-open-enabled: true
