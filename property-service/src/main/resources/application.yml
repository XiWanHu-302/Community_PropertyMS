server:
  port: 8082

spring:
  application:
    name: property-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        username: nacos
        password: nacos
        fail-fast: false
      config:
        import-check:
          enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/community_property?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: community-property-ms-secret-key-2026
  expiration: 86400000
