# ============================================================
# gateway — API 网关
# 端口 8080，统一入口 + 全局 CORS + 路由转发
# ============================================================
server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        username: nacos
        password: nacos
        fail-fast: false

    gateway:
      # 全局 CORS（前端只访问 8080，不再跨域访问各微服务）
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # ---- user-service ----
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/auth/**,/household/**,/building/**,/repair/**,/maintenance-staff/**,/dashboard/**

        # ---- property-service ----
        - id: property-service
          uri: lb://property-service
          predicates:
            - Path=/property-fee/**,/parking-fee/**,/parking-space/**,/hello,/feign-test

jwt:
  secret: community-property-ms-secret-key-2026
  expiration: 86400000
