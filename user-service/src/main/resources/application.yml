# user-service — 服务自身配置（公共配置在 Nacos community-property.yaml）
server:
  port: 8081

spring:
  application:
    name: user-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# 文件上传本地存储（绝对路径，user-service 模块下的 uploads 目录）
file:
  upload-dir: E:/code/JavaEE/Community_PropertyMS/user-service/uploads
