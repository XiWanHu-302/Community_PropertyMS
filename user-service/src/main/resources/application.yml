# ============================================================
# user-service 配置文件
# ============================================================
server:
  port: 8081

spring:
  application:
    name: user-service   # 服务名，注册到 Nacos 后以此名标识

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848   # Nacos 服务地址
        namespace: public             # 命名空间
        username: nacos               # Nacos 2.2+ 默认开启认证
        password: nacos
        fail-fast: false              # 注册失败不阻止启动（开发环境关掉）
      # Nacos 配置中心由 bootstrap.yml 管理
    openfeign:
      circuitbreaker:
        enabled: true             # Feign 降级：拦截 LoadBalancer 等所有异常

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/community_property?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true   # 下划线转驼峰（数据库 user_name → Java userName）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 控制台打印 SQL（开发用）

# JWT 配置
jwt:
  secret: community-property-ms-secret-key-2026   # JWT 签名密钥（生产环境放 Nacos 配置中心）
  expiration: 86400000                            # Token 过期时间（毫秒，默认24小时）
